<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños del Día</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14; color: #fff;
    font-family: 'DM Sans', sans-serif;
    width: 1920px; height: 1080px;
    overflow: hidden; position: relative;
  }
  .stars {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,100,180,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(100,150,255,0.06) 0%, transparent 50%);
    z-index: 0;
  }
  .particle {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float linear infinite; z-index: 0;
  }
  @keyframes float {
    0%   { transform: translateY(1100px) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }
  .main {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 80px;
  }
  .header { text-align: center; margin-bottom: 60px; }
  .header-label {
    font-size: 20px; font-weight: 300;
    letter-spacing: 8px; text-transform: uppercase;
    color: rgba(255,215,0,0.7); margin-bottom: 12px;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 72px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #FFD700, #FF8C42, #FF6B9D);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-date { font-size: 22px; color: rgba(255,255,255,0.5); margin-top: 14px; letter-spacing: 2px; }
  .carousel-wrapper { width: 100%; max-width: 1600px; position: relative; overflow: hidden; }
  .carousel-track { display: flex; gap: 40px; transition: transform 0.7s cubic-bezier(0.4,0,0.2,1); }
  .card {
    min-width: 480px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2); border-radius: 24px;
    padding: 48px 44px; display: flex; flex-direction: column;
    align-items: center; text-align: center;
    position: relative; overflow: hidden;
    backdrop-filter: blur(10px); flex-shrink: 0;
    animation: cardIn 0.6s ease both;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #FFD700, #FF8C42, #FF6B9D, #FFD700);
    background-size: 200% 100%; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  @keyframes cardIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  .cake-icon { font-size: 56px; margin-bottom: 20px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
  .avatar {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, #FFD700, #FF8C42);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700;
    color: #0a0a14; margin-bottom: 28px;
    border: 3px solid rgba(255,215,0,0.4); box-shadow: 0 0 40px rgba(255,215,0,0.2);
  }
  .emp-name { font-family:'Playfair Display',serif; font-size:38px; font-weight:700; color:#fff; line-height:1.15; margin-bottom:12px; }
  .emp-cargo { font-size:20px; font-weight:500; color:#FFD700; margin-bottom:8px; letter-spacing:0.5px; }
  .emp-division { font-size:17px; font-weight:300; color:rgba(255,255,255,0.55); letter-spacing:1px; text-transform:uppercase; }
  .wish { margin-top:28px; font-size:15px; color:rgba(255,215,0,0.6); font-style:italic; letter-spacing:0.5px; }
  .empty-state { text-align:center; padding:60px; }
  .empty-icon { font-size:80px; margin-bottom:28px; opacity:0.5; }
  .empty-title { font-family:'Playfair Display',serif; font-size:42px; color:rgba(255,255,255,0.4); margin-bottom:16px; }
  .empty-sub { font-size:20px; color:rgba(255,255,255,0.25); }
  .dots { display:flex; gap:10px; margin-top:40px; justify-content:center; }
  .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); transition:all 0.3s; }
  .dot.active { background:#FFD700; width:28px; border-radius:4px; }
  .footer { position:absolute; bottom:28px; right:48px; font-size:14px; color:rgba(255,255,255,0.18); letter-spacing:1px; }
</style>
</head>
<body>
<div class="stars"></div>
<div class="main">
  <div class="header">
    <div class="header-label">✦ &nbsp; celebramos hoy &nbsp; ✦</div>
    <div class="header-title">¡Feliz Cumpleaños!</div>
    <div class="header-date" id="fecha-hoy"></div>
  </div>
  <div id="content-area" class="carousel-wrapper">
    <div class="carousel-track" id="track"></div>
  </div>
  <div class="dots" id="dots"></div>
</div>
<div class="footer" id="footer-hora"></div>

<script>
  // ── CONFIGURACIÓN ──────────────────────────────────────────────
  // Reemplaza con el ID de tu Google Sheet (la parte larga de la URL)
  // URL de ejemplo: https://docs.google.com/spreadsheets/d/SHEET_ID/edit
  const SHEET_ID = '2PACX-1vRxyEMbgjo80PJG5ojJxDao_2lwHHMJTijpCf1YDVVqG_BZpJRMn1uvj5N-E1a5ARMVAWxMyZtc4uNL';

  // ¿Es un Sheet publicado (pub) o un Sheet normal compartido?
  // Si publicaste con "Publicar en la web" → USA_PUB = true
  // Si solo compartiste el link → USA_PUB = false
  const USA_PUB = true;

  const DURACION_POR_TARJETA = 6000;
  // ───────────────────────────────────────────────────────────────

  function esCumpleanos(fechaStr) {
    if (!fechaStr) return false;
    const hoy = new Date();
    const diaHoy = String(hoy.getDate()).padStart(2,'0');
    const mesHoy = String(hoy.getMonth()+1).padStart(2,'0');
    const s = String(fechaStr).trim();

    // DD/MM/YYYY o DD/MM
    if (s.includes('/')) {
      const p = s.split('/');
      return p[0].padStart(2,'0') === diaHoy && p[1].padStart(2,'0') === mesHoy;
    }
    // YYYY-MM-DD
    if (s.includes('-') && s.length >= 8) {
      const p = s.split('-');
      if (p[0].length === 4) return p[2].padStart(2,'0') === diaHoy && p[1].padStart(2,'0') === mesHoy;
      return p[0].padStart(2,'0') === diaHoy && p[1].padStart(2,'0') === mesHoy;
    }
    return false;
  }

  function iniciales(nombre) {
    if (!nombre) return '?';
    const p = nombre.trim().split(' ');
    return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : p[0][0].toUpperCase();
  }

  function crearParticulas() {
    const colores = ['#FFD700','#FF8C42','#FF6B9D','#A78BFA','#60A5FA'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random()*8+3;
      p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;
        background:${colores[Math.floor(Math.random()*colores.length)]};
        animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*-15}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};`;
      document.body.appendChild(p);
    }
  }

  function crearTarjeta(emp) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="cake-icon">🎂</div>
      <div class="avatar">${iniciales(emp.Empleado)}</div>
      <div class="emp-name">${emp.Empleado}</div>
      <div class="emp-cargo">${emp.Cargo}</div>
      <div class="emp-division">${emp.Division}</div>
      <div class="wish">¡Muchas felicidades en este día especial!</div>`;
    return div;
  }

  function mostrarVacio() {
    document.getElementById('content-area').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎈</div>
        <div class="empty-title">Sin cumpleaños hoy</div>
        <div class="empty-sub">¡Que tengan un excelente día!</div>
      </div>`;
  }

  let currentIndex = 0;

  function irA(index) {
    currentIndex = index;
    const track = document.getElementById('track');
    const cardWidth = 480 + 40;
    const visible = Math.floor(1600 / cardWidth);
    const offset = Math.min(currentIndex, Math.max(0, total - visible));
    track.style.transform = `translateX(-${offset * cardWidth}px)`;
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === currentIndex));
  }

  let total = 0;
  function iniciarCarrusel(lista) {
    const track = document.getElementById('track');
    const dotsEl = document.getElementById('dots');
    total = lista.length;
    lista.forEach(emp => track.appendChild(crearTarjeta(emp)));
    if (total > 1) {
      lista.forEach((_,i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i===0?' active':'');
        dotsEl.appendChild(dot);
      });
      setInterval(() => { currentIndex = (currentIndex+1) % total; irA(currentIndex); }, DURACION_POR_TARJETA);
    }
  }

  // ── Carga datos via JSONP (sin CORS) usando la API de Google Visualization ──
  function cargarDatos() {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now();
      const timer = setTimeout(() => { delete window[cbName]; reject(new Error('Timeout')); }, 12000);

      window[cbName] = function(resp) {
        clearTimeout(timer);
        delete window[cbName];
        try {
          const table = resp.table;
          const cols = table.cols.map(c => (c.label||'').trim());
          console.log('Columnas:', cols);

          function norm(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
          function findIdx(opts) { for(const o of opts){ const i=cols.findIndex(c=>norm(c)===norm(o)); if(i!==-1) return i; } return -1; }

          const iEmp = findIdx(['Empleado','Nombre']);
          const iCar = findIdx(['Cargo','Puesto']);
          const iDiv = findIdx(['Division','División','Area','Área']);
          const iFec = findIdx(['Fecha','Cumpleanos','Cumpleaños']);
          console.log('Índices Emp/Cargo/Div/Fecha:', iEmp, iCar, iDiv, iFec);

          const rows = (table.rows||[]).map((r,i) => {
            const v = r.c || [];
            const getStr = idx => {
              if (idx === -1 || !v[idx]) return '';
              // Para fechas Google devuelve {v: "Date(yyyy,m,d)", f: "dd/mm/yyyy"}
              if (v[idx].f) return String(v[idx].f).trim();
              return v[idx].v != null ? String(v[idx].v).trim() : '';
            };
            const obj = { Empleado: getStr(iEmp), Cargo: getStr(iCar), Division: getStr(iDiv), Fecha: getStr(iFec) };
            console.log('Fila', i+1, obj);
            return obj;
          }).filter(r => r.Empleado);

          resolve(rows);
        } catch(e) { reject(e); }
      };

      // URL de la API de visualización — funciona sin CORS
      const baseUrl = USA_PUB
        ? `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pubhtml`
        : `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;
      const apiUrl = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&tq=select+*&t=${Date.now()}`;

      console.log('Cargando desde:', apiUrl.substring(0,100));
      const s = document.createElement('script');
      s.src = apiUrl;
      s.onerror = () => { clearTimeout(timer); reject(new Error('Script error')); };
      document.head.appendChild(s);
    });
  }

  function actualizarReloj() {
    const ahora = new Date();
    document.getElementById('footer-hora').textContent =
      ahora.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
  }

  async function init() {
    crearParticulas();
    const hoy = new Date();
    const opts = {weekday:'long', day:'numeric', month:'long'};
    const fechaStr = hoy.toLocaleDateString('es-CL', opts);
    document.getElementById('fecha-hoy').textContent = fechaStr.charAt(0).toUpperCase() + fechaStr.slice(1);
    actualizarReloj();
    setInterval(actualizarReloj, 60000);

    try {
      const datos = await cargarDatos();
      const cumpleaneros = datos.filter(e => esCumpleanos(e.Fecha));
      console.log('Cumpleañeros hoy:', cumpleaneros.length, cumpleaneros.map(e=>e.Empleado));
      cumpleaneros.length > 0 ? iniciarCarrusel(cumpleaneros) : mostrarVacio();
    } catch(err) {
      console.error('Error cargando datos:', err);
      mostrarVacio();
    }

    // Recarga cada 5 minutos para reflejar cambios en la planilla
    setTimeout(() => location.reload(), 5 * 60 * 1000);
  }

  init();
</script>
</body>
</html>
