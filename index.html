<script>
  var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxyEMbgjo80PJG5ojJxDao_2lwHHMJTijpCf1YDVVqG_BZpJRMn1uvj5N-E1a5ARMVAWxMyZtc4uNL/pub?gid=0&single=true&output=csv";
  var DURACION = 6000;

  function esCumpleanos(f) {
    if (!f) return false;
    var hoy = new Date();
    var d = String(hoy.getDate()).padStart(2,"0");
    var m = String(hoy.getMonth()+1).padStart(2,"0");
    var s = String(f).trim();
    if (s.indexOf("/") !== -1) { var p=s.split("/"); return p[0].padStart(2,"0")===d && p[1].padStart(2,"0")===m; }
    if (s.indexOf("-") !== -1) { var p=s.split("-"); if(p[0].length===4) return p[2].padStart(2,"0")===d&&p[1].padStart(2,"0")===m; return p[0].padStart(2,"0")===d&&p[1].padStart(2,"0")===m; }
    return false;
  }

  function iniciales(n) { if(!n) return "?"; var p=n.trim().split(" "); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():p[0][0].toUpperCase(); }

  function crearParticulas() {
    var col=["#FFD700","#FF8C42","#FF6B9D","#A78BFA","#60A5FA"];
    for(var i=0;i<30;i++) {
      var p=document.createElement("div"); p.className="particle";
      var sz=Math.random()*8+3;
      p.style.cssText="width:"+sz+"px;height:"+sz+"px;left:"+(Math.random()*100)+"%;background:"+col[Math.floor(Math.random()*col.length)]+";animation-duration:"+(Math.random()*12+8)+"s;animation-delay:"+(Math.random()*-15)+"s;border-radius:"+(Math.random()>0.5?"50%":"2px")+";";
      document.body.appendChild(p);
    }
  }

  function crearTarjeta(e) {
    var d=document.createElement("div"); d.className="card";
    d.innerHTML="<div class=\"cake-icon\">&#127874;</div>"
      +"<div class=\"avatar\">"+iniciales(e.Empleado)+"</div>"
      +"<div class=\"emp-name\">"+e.Empleado+"</div>"
      +"<div class=\"emp-cargo\">"+e.Cargo+"</div>"
      +"<div class=\"emp-division\">"+e.Division+"</div>"
      +"<div class=\"wish\">&#161;Muchas felicidades en este d&#237;a especial!</div>";
    return d;
  }

  function mostrarVacio() {
    document.getElementById("content-area").innerHTML=
      "<div class=\"empty-state\"><div class=\"empty-icon\">&#127880;</div>"
      +"<div class=\"empty-title\">Sin cumplea&#241;os hoy</div>"
      +"<div class=\"empty-sub\">&#161;Que tengan un excelente d&#237;a!</div></div>";
  }

  var currentIndex=0, total=0;

  function irA(idx) {
    currentIndex=idx;
    var cw=520, vis=Math.floor(1600/cw);
    var off=Math.min(currentIndex,Math.max(0,total-vis));
    document.getElementById("track").style.transform="translateX(-"+(off*cw)+"px)";
    document.querySelectorAll(".dot").forEach(function(d,i){d.classList.toggle("active",i===currentIndex);});
  }

  function iniciarCarrusel(lista) {
    var track=document.getElementById("track");
    var dots=document.getElementById("dots");
    total=lista.length;
    lista.forEach(function(e){track.appendChild(crearTarjeta(e));});
    if(total>1) {
      lista.forEach(function(_,i){var d=document.createElement("div");d.className="dot"+(i===0?" active":"");dots.appendChild(d);});
      setInterval(function(){currentIndex=(currentIndex+1)%total;irA(currentIndex);},DURACION);
    }
  }

  function parsearLinea(linea) {
    var campos=[],campo="",enc=false;
    for(var i=0;i<linea.length;i++) {
      var c=linea[i];
      if(c==='"') { if(enc&&linea[i+1]==='"'){campo+='"';i++;}else{enc=!enc;} }
      else if(c===","&&!enc){campos.push(campo.trim());campo="";}
      else{campo+=c;}
    }
    campos.push(campo.trim()); return campos;
  }

  function normTxt(s){return(s||"").toLowerCase().replace(/[aeiou]/g,function(x){return x;}).trim();}

  function buscarCol(enc,opts) {
    for(var oi=0;oi<opts.length;oi++)
      for(var ei=0;ei<enc.length;ei++)
        if(enc[ei].toLowerCase().trim()===opts[oi].toLowerCase().trim()) return ei;
    return -1;
  }

  function parsearCSV(txt) {
    var lines=txt.trim().split(/\r?\n/);
    if(lines.length<2) return [];
    var enc=parsearLinea(lines[0]);
    console.log("Encabezados:",enc);
    var iE=buscarCol(enc,["Empleado","Nombre"]);
    var iC=buscarCol(enc,["Cargo","Puesto"]);
    var iD=buscarCol(enc,["Division","Divisi\u00f3n","Area","\u00c1rea"]);
    var iF=buscarCol(enc,["Fecha","Cumplea\u00f1os","Cumpleanos"]);
    console.log("Cols Emp/Cargo/Div/Fecha:",iE,iC,iD,iF);
    var res=[];
    for(var i=1;i<lines.length;i++){
      if(!lines[i].trim()) continue;
      var v=parsearLinea(lines[i]);
      var o={Empleado:iE!==-1?(v[iE]||""):"",Cargo:iC!==-1?(v[iC]||""):"",Division:iD!==-1?(v[iD]||""):"",Fecha:iF!==-1?(v[iF]||""):""};
      console.log("Fila "+i+":",JSON.stringify(o));
      if(o.Empleado) res.push(o);
    }
    return res;
  }

  function actualizarReloj(){
    var a=new Date();
    document.getElementById("footer-hora").textContent=a.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
  }

  function init(){
    crearParticulas();
    var hoy=new Date();
    var fs=hoy.toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"});
    document.getElementById("fecha-hoy").textContent=fs.charAt(0).toUpperCase()+fs.slice(1);
    actualizarReloj();
    setInterval(actualizarReloj,60000);

    fetch(CSV_URL+"&nc="+Date.now(),{cache:"no-store"})
      .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
      .then(function(txt){
        console.log("CSV OK:",txt.substring(0,150));
        var datos=parsearCSV(txt);
        var hoy=datos.filter(function(e){return esCumpleanos(e.Fecha);});
        console.log("Cumpleaneros:",hoy.length,hoy.map(function(e){return e.Empleado;}));
        if(hoy.length>0){iniciarCarrusel(hoy);}else{mostrarVacio();}
      })
      .catch(function(err){console.error("Error CSV:",err.message);mostrarVacio();});

    setTimeout(function(){location.reload();},5*60*1000);
  }

  init();
</script>
</body>
</html>
